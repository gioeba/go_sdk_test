version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - noctx
    - nilerr
    - revive
    - exhaustive
    - testifylint
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - unnamedResult
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: unused-parameter
        - name: redefines-builtin-id
    exhaustive:
      default-signifies-exhaustive: true
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - goimports
    - gofmt
  settings:
    goimports:
      local-prefixes:
        - github.com/gioeba/go_sdk_test

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
